version: "3.9"

services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  aidemo:
    build: .
    container_name: aidemo
    ports:
      - "8080:8080"
    depends_on:
      - ollama
    environment:
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL: tinyllama
      JAVA_OPTS: "-Xms256m -Xmx512m"

volumes:
  ollama_data: