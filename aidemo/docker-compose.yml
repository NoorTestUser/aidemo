version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

    # ✅ Force ONLY server mode (no shell tricks)
    command: ["serve"]

  # ✅ separate one-time model downloader (clean solution)
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command: |
      echo "Waiting for Ollama..."
      until curl -s http://ollama:11434/api/tags > /dev/null; do
        sleep 2
      done
      echo "Pulling model..."
      ollama pull tinyllama
      echo "Done."

  aidemo:
    build: .
    container_name: aidemo
    ports:
      - "8080:8080"
    depends_on:
      - ollama
      - ollama-init
    environment:
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      SPRING_AI_OLLAMA_CHAT_OPTIONS_MODEL: tinyllama
      JAVA_OPTS: "-Xms256m -Xmx512m"

volumes:
  ollama_data:
