version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aidemo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aidemo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aidemo"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    command: ["serve"]   # ✅ IMPORTANT (force server mode)
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      echo "Waiting for Ollama..."
      until curl -f http://ollama:11434/api/tags >/dev/null; do
        sleep 2
      done
      echo "Pulling models..."
      ollama pull nomic-embed-text   # ✅ REQUIRED for embeddings
      echo "Done."
    volumes:
      - ollama_data:/root/.ollama
    restart: "no"

  aidemo:
    build: .
    container_name: aidemo
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: groq     # ✅ IMPORTANT
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/aidemo
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      SPRING_AI_OLLAMA_EMBEDDING_OPTIONS_MODEL: nomic-embed-text
      JAVA_OPTS: "-Xms256m -Xmx512m"

volumes:
  pgdata:
  ollama_data:
